# table_metadata.yaml — 테이블별 조인 패턴 및 메타데이터
# 실제 DB 스키마(컬럼명/타입)는 get_filtered_schema_context()로 자동 로드됨
# 이 파일은 조인 경로, 주의사항, 사용 규칙만 관리
#
# geometry 컬럼 사용법 (SQL_GENERATION_PROMPT 규칙 참고):
#   좌표 추출: ST_Y(location) AS lat, ST_X(location) AS lng
#   경계 GeoJSON: ST_AsGeoJSON(boundary)
#   해당 컬럼 보유 테이블: adong, ldong, gu, univ, park (boundary+location)
#                          amenity, store, library, subway_station, bus_stop, rent_deal (location만)

# ── 부동산 ─────────────────────────────────────────────────────────────────

rent_deal:
  description: 전월세 실거래 데이터 (2011~현재)
  category: 부동산
  key_column: ldong_code
  join_path: rent_deal.ldong_code = ldong.ldong_code
  filters: monthly_rent > 10
  note: |
    adong_code 직접 조인 절대 금지. MIN 대신 AVG 사용 권장
    store와 직접 조인 금지 — 카운트 폭발 발생
    월세와 시설 수를 같이 조회할 때는 반드시 별도 SQL로 분리할 것
    월세: monthly_rent > 0 / 전세: monthly_rent = 0 AND deposit > 0
    housing_type 값: 오피스텔, 연립다세대, 단독, 다가구 (아파트 제외 필터링 권장)
    location(POINT): 개별 매물 좌표. map 타입 반환 시 ST_Y/ST_X 사용

# ── 시설 ───────────────────────────────────────────────────────────────────

library:
  description: 도서관 마스터 (공공/작은도서관)
  category: 시설
  key_column: adong_code
  join_path: library.adong_code = adong.adong_code
  sub_join: library_hours.library_id = library.id
  note: |
    univ_adong과 library 직접 조인 금지
    location(POINT): 개별 도서관 좌표. map 타입 반환 시 ST_Y/ST_X 사용

library_hours:
  description: 도서관 요일별 운영시간
  category: 시설
  key_column: library_id
  join_path: library_hours.library_id = library.id
  note: "day_type 값: MON/TUE/WED/THU/FRI/SAT/SUN (한국어 요일 사용 금지)"

store:
  description: 상가 점포 (소상공인 데이터)
  category: 시설
  key_column: adong_code
  join_path: store.adong_code = adong.adong_code
  note: |
    업종코드 알면 WHERE store.category_code = '코드' 로 직접 필터링. business_category 조인 불필요
    rent_deal과 직접 조인 금지 — 카운트 폭발 발생
    월세와 시설 수를 같이 조회할 때는 반드시 별도 SQL로 분리할 것
    location(POINT): 개별 점포 좌표. map 타입 반환 시 ST_Y/ST_X 사용

park:
  description: 서울시 공원
  category: 시설
  bridge_table: park_adong
  join_path: park_adong.park_id = park.id, park_adong.adong_code = adong.adong_code
  alt_join: park_ldong.ldong_code = ldong.ldong_code (법정동 기준 시)
  note: |
    location(POINT): 공원 중심 좌표. boundary(MULTIPOLYGON): 공원 경계
    map 타입 반환 시 ST_Y/ST_X 사용. 경계는 ST_AsGeoJSON(boundary)

amenity:
  description: 시설 통합 테이블 (카페/편의점/헬스장/병원/공원 등 53만 건)
  category: 시설
  key_column: id
  join_path: amenity.id = amenity_adong.amenity_id → amenity_adong.adong_code = adong.adong_code
  note: |
    category 컬럼으로 필터링 (한국어 금지, 영문 소문자만 사용):
      cafe, convenience, gym, hospital, pharmacy, laundry, studycafe,
      mart, restaurant, library, park, subway_station, university
    store보다 단순하게 시설 수 집계 가능. category_code 불필요.
    법정동 기준: amenity.id = amenity_ldong.amenity_id → amenity_ldong.ldong_code = ldong.ldong_code
    location(POINT): 개별 시설 좌표. map 타입 반환 시 ST_Y/ST_X 사용

# ── 교통 ───────────────────────────────────────────────────────────────────

subway_station:
  description: 지하철역 (1~9호선 서울 구간)
  category: 교통
  key_column: adong_code
  join_path: subway_station.adong_code = adong.adong_code
  sub_join: subway_congestion.station_id = subway_station.id
  note: |
    호선 필터는 line 컬럼 사용 (name 아님). 예: WHERE line = '2호선'
    ldong_code도 보유하므로 rent_deal과 직접 조인 가능:
    subway_station.ldong_code = rent_deal.ldong_code → ldong → gu
    day_type = '평일'/'토요일'/'일요일'/'휴일'
    location(POINT): 역 좌표. map 타입 반환 시 ST_Y/ST_X 사용

bus_stop:
  description: 버스 정류장
  category: 교통
  key_column: adong_code
  join_path: bus_stop.adong_code = adong.adong_code
  sub_join: bus_congestion.bus_stop_id = bus_stop.id
  note: |
    location NULL 719건 존재 (가상/차고지). map 반환 시 WHERE location IS NOT NULL 필수
    location(POINT): 정류장 좌표. map 타입 반환 시 ST_Y/ST_X 사용

nearest_subway_adong:
  description: 행정동별 최근접 지하철역 이름·거리 (rank 1 = 가장 가까운 역)
  category: 교통
  key_column: adong_code
  join_path: nearest_subway_adong.adong_code = adong.adong_code
  note: |
    rank=1만 사용하면 동네별 가장 가까운 역까지 거리 비교 가능
    컬럼: rank, station_name, distance_m, adong_code
    subway_station 조인 없이 바로 접근성 집계 가능

nearest_subway_ldong:
  description: 법정동별 최근접 지하철역 이름·거리 (rank 1 = 가장 가까운 역)
  category: 교통
  key_column: ldong_code
  join_path: nearest_subway_ldong.ldong_code = ldong.ldong_code
  note: "rank=1만 사용. 컬럼: rank, station_name, distance_m, ldong_code"

# ── 장소 ───────────────────────────────────────────────────────────────────

univ:
  description: 대학 캠퍼스
  category: 장소
  to_rent_deal: univ → univ_ldong(ldong_code) → adjacent_ldong(양방향) → rent_deal(ldong_code)
  to_facility: univ → univ_adong(adong_code) → adjacent_adong(양방향) → [시설](adong_code)
  note: |
    월세는 ldong 경로, 도서관/공원/상가는 adong 경로 사용
    location(POINT): 대학 중심 좌표. boundary(MULTIPOLYGON): 캠퍼스 경계

# ── 행정구역 ───────────────────────────────────────────────────────────────

adong:
  description: 행정동 (426개)
  category: 행정구역
  key_column: adong_code
  join_path: adong.gu_code = gu.gu_code
  note: |
    ldong_code 컬럼 없음. LEFT(adong_code, 5) = gu_code로 gu 연결 가능
    location(POINT): 행정동 중심 좌표. boundary(MULTIPOLYGON): 행정동 경계
    경계 GeoJSON 반환: ST_AsGeoJSON(boundary)

ldong:
  description: 법정동 (467개)
  category: 행정구역
  key_column: ldong_code
  join_path: ldong.gu_code = gu.gu_code
  note: |
    gu_code 컬럼 있음. adong을 경유하지 않고 ldong → gu 직접 조인
    location(POINT): 법정동 중심 좌표. boundary(MULTIPOLYGON): 법정동 경계
    경계 GeoJSON 반환: ST_AsGeoJSON(boundary)

gu:
  description: 서울시 자치구 (25개)
  category: 행정구역
  key_column: gu_code
  join_path: gu.gu_code (기준 테이블)
  note: |
    location(POINT): 구 중심 좌표. boundary(MULTIPOLYGON): 구 경계
    경계 GeoJSON 반환: ST_AsGeoJSON(boundary)

adjacent_adong:
  description: 인접 행정동 관계 (adong1_code ↔ adong2_code 양방향)
  category: 행정구역
  note: 행정동 단위 인접 지역 확장 쿼리에 활용

adjacent_ldong:
  description: 인접 법정동 관계 (ldong1_code ↔ ldong2_code 양방향)
  category: 행정구역
  note: ldong1_code, ldong2_code 양방향 조인

adjacent_gu:
  description: 인접 자치구 관계 (gu1_code ↔ gu2_code 양방향)
  category: 행정구역
  note: gu1_code, gu2_code 양방향 조인. 구 단위 인접 지역 확장 쿼리에 활용

rent_deal_ldong_adong_map:
  description: 법정동↔행정동 코드 매핑 테이블
  category: 행정구역
  note: ldong_code ↔ adong_code 변환이 필요할 때 사용

# ── 인구 ───────────────────────────────────────────────────────────────────

ldong_population:
  description: 법정동 월별 인구 (2022-09~현재)
  category: 인구
  key_column: ldong_code
  join_path: ldong_population.ldong_code = ldong.ldong_code
  note: date 컬럼으로 기간 필터링 권장

adong_population:
  description: 행정동 월별 인구 (2022-09~현재)
  category: 인구
  key_column: adong_code
  join_path: adong_population.adong_code = adong.adong_code
  note: date 컬럼으로 기간 필터링 권장

# ── 지표 ───────────────────────────────────────────────────────────────────

gu_metric:
  description: 자치구별 지표 시계열 (안전등급, 인구, 교통 등)
  category: 지표
  key_column: gu_code
  join_path: gu_metric.gu_code = gu.gu_code
  note: metric_code로 원하는 지표 필터링. metric 테이블에서 코드 확인 가능

current_adong:
  description: 행정동별 현재 종합점수 (월세·시설·교통, 0~1 정규화)
  category: 지표
  key_column: adong_code
  note: score_rent, score_amenity, score_transit. 동네 종합 랭킹 쿼리에 활용

current_ldong:
  description: 법정동별 현재 종합점수 (월세·시설·교통, 0~1 정규화)
  category: 지표
  key_column: ldong_code

current_gu:
  description: 자치구별 현재 종합점수 (월세·시설·교통, 0~1 정규화)
  category: 지표
  key_column: gu_code
